<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocX 智能解析器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"
        onerror="this.onerror=null;this.src='https://unpkg.com/jszip@3.10.1/dist/jszip.min.js'"></script>
<script>
window.addEventListener('load',function(){
  if(typeof JSZip==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.onerror=function(){showEnvError('cdn')};
    document.head.appendChild(s);
  }
});
</script>
<style>
  :root {
    --bg:#ffffff;--bg2:#f7f7f8;--card:#ffffff;
    --brd:#e4e4e8;--brd2:#d0d0d6;
    --fg:#1a1a1f;--fg2:#5a5a64;--fg3:#9a9aa2;
    --accent:#d4872e;--accent-d:#b87325;
    --red:#d43d3d;--red-glow:rgba(212,61,61,.1);
    --yel:#c8960a;--yel-bg:rgba(200,150,10,.08);--yel-brd:rgba(200,150,10,.3);
    --ok:#3a9d3e;--err:#d43d3d;--info:#2e8bc0;
    --paper-t:#2c2c2c;--paper-m:#888;--paper-brd:#e8e8ec;
    --r:12px;--rs:8px;--rl:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}

  .bg-a{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .bg-a::before{content:'';position:absolute;top:-12%;right:-6%;width:500px;height:500px;background:radial-gradient(circle,rgba(212,61,61,.04),transparent 70%);animation:blob 22s ease-in-out infinite}
  .bg-a::after{content:'';position:absolute;bottom:-8%;left:-6%;width:400px;height:400px;background:radial-gradient(circle,rgba(200,150,10,.03),transparent 70%);animation:blob 28s ease-in-out infinite reverse}
  @keyframes blob{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-25px) scale(1.08)}66%{transform:translate(-20px,15px) scale(.95)}}
  .bg-g{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,0,0,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.015) 1px,transparent 1px);background-size:56px 56px}

  .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 24px 80px}

  header{text-align:center;margin-bottom:40px;animation:fu .6s ease-out}
  @keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .logo{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:var(--r);background:linear-gradient(135deg,var(--red),var(--accent));margin-bottom:18px;box-shadow:0 4px 16px var(--red-glow)}
  .logo svg{width:26px;height:26px;fill:#fff}
  header h1{font-family:'Noto Serif SC',serif;font-size:38px;font-weight:900;letter-spacing:-1px;color:var(--fg)}
  header h1 em{font-style:normal;color:var(--red)}
  header p{margin-top:8px;color:var(--fg2);font-size:15px;font-weight:300}
  header p b{color:var(--yel);font-weight:600}

  .upload-zone{border:2px dashed var(--brd);border-radius:var(--rl);padding:100px 60px;text-align:center;cursor:pointer;transition:.25s;background:var(--bg2);position:relative;overflow:hidden;margin-bottom:36px;animation:fu .6s ease-out .08s both;min-height:380px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .upload-zone::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--red-glow),transparent 60%);opacity:0;transition:.25s}
  .upload-zone:hover,.upload-zone.over{border-color:var(--accent);background:var(--card)}
  .upload-zone:hover::before,.upload-zone.over::before{opacity:1}
  .upload-zone.over{transform:scale(1.005)}
  .u-icon{position:relative;z-index:1;width:80px;height:80px;margin:0 auto 24px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;border:1px solid var(--brd);transition:.25s;box-shadow:0 2px 12px rgba(0,0,0,.05)}
  .upload-zone:hover .u-icon{border-color:var(--accent);box-shadow:0 0 20px var(--red-glow)}
  .u-icon svg{width:36px;height:36px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .upload-zone h3{position:relative;z-index:1;font-size:20px;font-weight:600;margin-bottom:10px;color:var(--fg)}
  .upload-zone h3 u{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
  .upload-zone p{position:relative;z-index:1;color:var(--fg3);font-size:14px;line-height:1.6}
  #fileInput{display:none}

  .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;animation:fu .6s ease-out .14s both}
  .sec-head h2{font-size:18px;font-weight:600}
  .sec-head .count{color:var(--fg3);font-size:13px}

  .file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;animation:fu .6s ease-out .18s both}
  .file-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:20px;cursor:pointer;transition:.25s;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .file-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--red-glow),transparent 50%);opacity:0;transition:.25s}
  .file-card:hover{border-color:var(--brd2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
  .file-card:hover::after{opacity:1}
  .fc-inner{position:relative;z-index:1}
  .fc-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
  .fc-icon{width:42px;height:42px;border-radius:var(--rs);background:linear-gradient(135deg,#2b5797,#3e7cc1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .fc-icon span{color:#fff;font-weight:700;font-size:10px;letter-spacing:.5px}
  .fc-info{flex:1;min-width:0}
  .fc-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)}
  .fc-meta{color:var(--fg3);font-size:12px;margin-top:2px}
  .fc-badges{display:flex;gap:8px;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
  .badge.red{background:rgba(212,61,61,.08);color:var(--red);border:1px solid rgba(212,61,61,.18)}
  .badge.yel{background:var(--yel-bg);color:var(--yel);border:1px solid var(--yel-brd)}
  .fc-del{position:absolute;top:12px;right:12px;z-index:2;width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--fg3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;opacity:0}
  .file-card:hover .fc-del{opacity:1}
  .fc-del:hover{background:rgba(212,61,61,.08);color:var(--red)}
  .fc-del svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

  .empty-state{text-align:center;padding:60px 20px;color:var(--fg3);animation:fu .6s ease-out .18s both}
  .empty-state svg{width:56px;height:56px;stroke:var(--brd2);fill:none;margin-bottom:16px;stroke-width:1.2}
  .empty-state p{font-size:14px}

  .env-error{display:none;position:fixed;inset:0;z-index:9999;background:rgba(255,255,255,.97);align-items:center;justify-content:center;padding:40px}
  .env-error.show{display:flex}
  .env-error-box{text-align:center;max-width:520px}
  .env-error-box .icon{width:72px;height:72px;border-radius:50%;background:#fef2f2;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
  .env-error-box .icon svg{width:36px;height:36px;stroke:var(--err);fill:none;stroke-width:1.5}
  .env-error-box h2{font-size:22px;font-weight:700;margin-bottom:12px;color:var(--fg)}
  .env-error-box p{font-size:15px;color:var(--fg2);line-height:1.8;margin-bottom:20px}
  .env-error-box code{display:block;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--rs);padding:14px 18px;font-size:13px;color:var(--accent);text-align:left;word-break:break-all;margin-bottom:16px;font-family:monospace}
  .env-error-box .note{font-size:13px;color:var(--fg3);line-height:1.7}

  .reader{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);flex-direction:column;animation:rfi .3s ease-out}
  .reader.open{display:flex}
  @keyframes rfi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .reader-bar{display:flex;align-items:center;gap:12px;padding:14px 24px;background:var(--bg2);border-bottom:1px solid var(--brd);flex-shrink:0;flex-wrap:wrap}
  .reader-bar .back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--brd);background:var(--card);color:var(--fg2);font-size:13px;font-weight:500;border-radius:var(--rs);cursor:pointer;transition:.2s;font-family:inherit}
  .reader-bar .back-btn:hover{border-color:var(--accent);color:var(--accent)}
  .reader-bar .back-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
  .reader-bar .r-name{font-weight:600;font-size:15px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)}
  .r-stats{display:flex;gap:12px;align-items:center}
  .r-stat{font-size:12px;color:var(--fg2);display:flex;align-items:center;gap:4px}
  .r-stat .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .r-stat .dot.rd{background:var(--red)}
  .r-stat .dot.yl{background:var(--yel)}

  .reader-body{flex:1;overflow-y:auto;padding:48px 64px;color:var(--paper-t);font-family:'Noto Serif SC',serif;font-size:15px;line-height:1.9}
  .reader-body::-webkit-scrollbar{width:8px}
  .reader-body::-webkit-scrollbar-track{background:transparent}
  .reader-body::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}

  .reader-body h1{font-size:26px;font-weight:900;color:#1a1a1a;margin:28px 0 14px;padding-bottom:10px;border-bottom:2px solid var(--paper-brd)}
  .reader-body h1:first-child{margin-top:0}
  .reader-body h2{font-size:21px;font-weight:700;color:#1a1a1a;margin:24px 0 10px}
  .reader-body h3{font-size:17px;font-weight:700;color:#1a1a1a;margin:20px 0 8px}
  .reader-body h4,.reader-body h5,.reader-body h6{font-weight:700;color:#1a1a1a;margin:18px 0 6px}
  .reader-body p{margin:8px 0;text-align:justify}
  .reader-body strong{font-weight:700}
  .reader-body em{font-style:italic}
  .reader-body u{text-decoration:underline}
  .reader-body ul,.reader-body ol{margin:10px 0;padding-left:26px}
  .reader-body li{margin:3px 0}
  .reader-body table{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px}
  .reader-body th,.reader-body td{border:1px solid var(--paper-brd);padding:9px 12px;text-align:left}
  .reader-body th{background:#f4f4f6;font-weight:700}
  .reader-body img{max-width:100%;height:auto;border-radius:4px;margin:10px 0}
  .reader-body blockquote{border-left:4px solid var(--accent);padding:6px 18px;margin:14px 0;background:#faf8f4;color:var(--paper-m);font-style:italic}

  .red-text{color:var(--red);font-weight:700}
  .yel-copy{display:inline;padding:2px 10px;border-radius:5px;background:rgba(200,150,10,.12);border:1px solid rgba(200,150,10,.3);color:#7a5c08;font-weight:500;cursor:pointer;transition:.2s;vertical-align:middle;margin:0 2px;line-height:1.7}
  .yel-copy:hover{background:rgba(200,150,10,.22);border-color:rgba(200,150,10,.5)}
  .yel-copy.copied{background:rgba(58,157,62,.1);border-color:rgba(58,157,62,.3);color:#2e7d32}

  .toast-c{position:fixed;top:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .toast{padding:12px 18px;border-radius:var(--rs);font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.1);animation:ti .3s ease-out;display:flex;align-items:center;gap:8px;max-width:340px;pointer-events:auto}
  .toast.ok{background:#eef7ee;border:1px solid #c5e1c5;color:#2e7d32}
  .toast.err{background:#fdeaea;border:1px solid #f0c0c0;color:#b82e2e}
  .toast.info{background:#eaf3fa;border:1px solid #b8d8ee;color:#1e6fa0}
  @keyframes ti{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
  @keyframes to{from{opacity:1}to{opacity:0;transform:translateX(30px)}}

  .loader-o{display:none;position:absolute;inset:0;background:rgba(255,255,255,.88);z-index:10;align-items:center;justify-content:center;flex-direction:column;gap:14px;border-radius:var(--rl)}
  .loader-o.on{display:flex}
  .spinner{width:36px;height:36px;border:3px solid var(--brd);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .loader-o span{color:var(--fg2);font-size:13px}

  @media(max-width:768px){
    .wrap{padding:20px 14px 60px}
    header h1{font-size:28px}
    .upload-zone{padding:60px 24px;min-height:280px}
    .file-grid{grid-template-columns:1fr}
    .reader-bar{padding:10px 14px}
    .reader-body{padding:24px 18px}
  }
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="bg-a"></div>
<div class="bg-g"></div>
<div class="toast-c" id="toastC"></div>

<div class="env-error" id="envError">
  <div class="env-error-box">
    <div class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
    <h2 id="envTitle">无法在此环境中使用</h2>
    <p id="envDesc"></p>
    <code id="envUrl"></code>
    <p class="note">请复制上面的完整链接，在新标签页中直接打开即可正常使用。</p>
  </div>
</div>

<div class="wrap" id="homeView">
  <header>
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><polyline points="14 2 14 8 20 8"/></svg></div>
    <h1>DocX <em>智能</em>解析器</h1>
    <p><b>红色</b> 文字高亮显示 · <b>黄色高亮</b> 点击即复制</p>
  </header>

  <div class="upload-zone" id="uploadZone">
    <div class="loader-o" id="loader"><div class="spinner"></div><span>正在解析文档...</span></div>
    <div class="u-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <h3>拖拽文件到此处，或 <u>点击选择</u></h3>
    <p>支持同时上传多个 .docx 文件</p>
    <input type="file" id="fileInput" accept=".docx" multiple>
  </div>

  <div class="sec-head" id="secHead" style="display:none">
    <h2>已上传文档</h2>
    <span class="count" id="docCount"></span>
  </div>
  <div class="file-grid" id="fileGrid"></div>
  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <p>还没有上传任何文档</p>
  </div>
</div>

<div class="reader" id="reader">
  <div class="reader-bar">
    <button class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      返回
    </button>
    <span class="r-name" id="rName">-</span>
    <div class="r-stats" id="rStats"></div>
  </div>
  <div class="reader-body" id="readerBody"></div>
</div>

<script>
/* ===== 环境检测 ===== */
function checkEnv(){
  try{
    if(window.self!==window.top){
      var frame=window.frameElement;
      if(frame&&(frame.getAttribute('sandbox')||'').indexOf('allow-same-origin')===-1){
        showEnvError('iframe');return false;
      }
    }
  }catch(e){showEnvError('iframe');return false}
  if(location.hostname==='github.com'||location.hostname==='www.github.com'){
    if(location.pathname.indexOf('/blob/')!==-1){showEnvError('preview');return false}
  }
  return true;
}
function showEnvError(type){
  var el=document.getElementById('envError');
  var title=document.getElementById('envTitle');
  var desc=document.getElementById('envDesc');
  var urlEl=document.getElementById('envUrl');
  if(type==='iframe'){
    title.textContent='请在浏览器中直接打开此页面';
    desc.textContent='你当前在嵌入框架中打开，文件上传功能被禁用。请复制下方链接，在新标签页中打开：';
  }else if(type==='preview'){
    title.textContent='请通过 GitHub Pages 链接访问';
    desc.textContent='你正在 GitHub 文件预览页面，此处无法使用上传功能。请前往 GitHub Pages 地址打开：';
  }else if(type==='cdn'){
    title.textContent='JSZip 库加载失败';
    desc.textContent='无法加载文档解析所需的库，请检查网络连接后刷新页面。';
    urlEl.style.display='none';
  }
  if(type!=='cdn'){
    var pagesUrl=location.href.replace(/^https?:\/\/github\.com\//,'https://').replace(/\/blob\/[^/]+\//,'/');
    urlEl.textContent=pagesUrl;urlEl.style.display='block';
  }
  el.classList.add('show');
}
if(checkEnv())initApp();

function initApp(){
'use strict';

var W='http://schemas.openxmlformats.org/wordprocessingml/2006/main';
var R='http://schemas.openxmlformats.org/officeDocument/2006/relationships';

var uploadZone=document.getElementById('uploadZone');
var fileInput=document.getElementById('fileInput');
var loader=document.getElementById('loader');
var fileGrid=document.getElementById('fileGrid');
var secHead=document.getElementById('secHead');
var docCount=document.getElementById('docCount');
var emptyState=document.getElementById('emptyState');
var reader=document.getElementById('reader');
var backBtn=document.getElementById('backBtn');
var rName=document.getElementById('rName');
var rStats=document.getElementById('rStats');
var readerBody=document.getElementById('readerBody');
var toastC=document.getElementById('toastC');

var docs=new Map();
var docIdCounter=0;

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'}
function fmtDate(d){if(!d||isNaN(d))return'未知';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}

function toast(msg,type){
  type=type||'info';
  var t=document.createElement('div');t.className='toast '+type;t.textContent=msg;
  toastC.appendChild(t);
  setTimeout(function(){t.style.animation='to .3s ease-in forwards';setTimeout(function(){t.remove()},300)},2500);
}

function gw(parent,tag){return parent.getElementsByTagNameNS(W,tag)}
function wval(el,attr){if(!el)return null;var v=el.getAttributeNS(W,attr);if(!v)v=el.getAttribute('w:'+attr);if(!v)v=el.getAttribute(attr);return v}
function rembed(el){if(!el)return null;var v=el.getAttributeNS(R,'embed');if(!v)v=el.getAttribute('r:embed');return v}

/* ===== 判断是否纯空白 ===== */
function isBlank(text){return /^\s*$/.test(text)}

/* ===== 检测填充色是否为黄色系 ===== */
function isYellowFill(hex){
  if(!hex)return false;
  var h=hex.replace(/^#/,'');
  if(h.length===4)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  if(h.length!==6)return false;
  var r=parseInt(h.substring(0,2),16),g=parseInt(h.substring(2,4),16),b=parseInt(h.substring(4,6),16);
  return r>170&&g>150&&b<130;
}

function isRed(hex){
  if(!hex)return false;
  var h=hex.replace(/^#/,'');
  if(h.length===4)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  if(h.length!==6)return false;
  var r=parseInt(h.substring(0,2),16),g=parseInt(h.substring(2,4),16),b=parseInt(h.substring(4,6),16);
  return r>150&&r>g*1.6&&r>b*1.6;
}
function isYellow(hlVal,shdFill){
  if(hlVal&&hlVal.toLowerCase()==='yellow')return true;
  return isYellowFill(shdFill);
}

/* ===== 检测段落级黄色底纹 ===== */
function isParagraphShadingYellow(para){
  var pPr=gw(para,'pPr')[0];
  if(!pPr)return false;
  var shd=gw(pPr,'shd')[0];
  if(!shd)return false;
  var val=wval(shd,'val');
  if(val&&val!=='clear')return false;
  var fill=wval(shd,'fill');
  return isYellowFill(fill);
}

uploadZone.addEventListener('click',function(e){if(!e.target.closest('.loader-o'))fileInput.click()});
uploadZone.addEventListener('dragover',function(e){e.preventDefault();uploadZone.classList.add('over')});
uploadZone.addEventListener('dragleave',function(){uploadZone.classList.remove('over')});
uploadZone.addEventListener('drop',function(e){e.preventDefault();uploadZone.classList.remove('over');for(var i=0;i<e.dataTransfer.files.length;i++){var f=e.dataTransfer.files[i];if(f.name.toLowerCase().endsWith('.docx'))handleFile(f)}});
fileInput.addEventListener('change',function(){for(var i=0;i<fileInput.files.length;i++){handleFile(fileInput.files[i])}fileInput.value=''});

backBtn.addEventListener('click',closeReader);
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&reader.classList.contains('open'))closeReader()});

function closeReader(){reader.classList.remove('open');document.body.style.overflow=''}

function handleFile(file){
  if(!file.name.toLowerCase().endsWith('.docx')){toast('跳过非 .docx 文件: '+file.name,'err');return}
  if(file.size>50*1048576){toast('文件过大: '+file.name,'err');return}
  loader.classList.add('on');
  file.arrayBuffer().then(function(buf){return parseDocx(buf)}).then(function(data){
    var id=++docIdCounter;
    docs.set(id,{name:file.name,size:file.size,date:file.lastModified,blocks:data.blocks,redCount:data.redCount,yelCount:data.yelCount});
    renderFileList();
    toast('解析成功: '+file.name,'ok');
  }).catch(function(err){
    console.error(err);toast('解析失败: '+file.name+' — '+(err.message||'未知错误'),'err');
  }).finally(function(){loader.classList.remove('on')});
}

/* ===== 段落内合并连续同色片段 ===== */
function mergeInParagraph(content){
  var out=[];
  for(var i=0;i<content.length;i++){
    var item=content[i];
    if(item.type==='red'&&out.length>0&&out[out.length-1].type==='red'){
      out[out.length-1].text+=item.text;
    }else if(item.type==='yel'&&out.length>0&&out[out.length-1].type==='yel'){
      out[out.length-1].text+=item.text;
    }else{
      out.push(item);
    }
  }
  return out;
}

/* ===== 跨段落/跨单元格合并连续同色 ===== */
function mergeAcrossBlocks(blocks){
  var lastType=null;
  var lastRef=null;

  for(var b=0;b<blocks.length;b++){
    var block=blocks[b];
    var paras=getParagraphs(block);
    for(var p=0;p<paras.length;p++){
      var content=paras[p];

      // 先段内合并
      var merged=mergeInParagraph(content);
      content.length=0;
      for(var m=0;m<merged.length;m++)content.push(merged[m]);

      // 跨段落合并
      for(var i=0;i<content.length;i++){
        var item=content[i];
        if(item.type==='red'||item.type==='yel'){
          if(lastType===item.type&&lastRef){
            // 同色连续：追加文本，删除当前片段
            lastRef.arr[lastRef.idx].text+=item.text;
            content.splice(i,1);
            i--;
          }else{
            lastType=item.type;
            lastRef={arr:content,idx:i};
          }
        }else if(item.type==='txt'&&isBlank(item.text)){
          // ★ 修复：纯空白文本不打断合并，直接跳过
          content.splice(i,1);
          i--;
        }else{
          // 有实际内容的普通文本才打断合并
          lastType=null;
          lastRef=null;
        }
      }
    }
  }
}

function getParagraphs(block){
  var res=[];
  if(block.type==='p')res.push(block.content);
  else if(block.type==='tbl'){
    for(var r=0;r<block.rows.length;r++){
      for(var c=0;c<block.rows[r].length;c++){
        for(var p=0;p<block.rows[r][c].length;p++){
          res.push(block.rows[r][c][p].content);
        }
      }
    }
  }
  return res;
}

/* ===== 解析 docx ===== */
function parseDocx(buf){
  return JSZip.loadAsync(buf).then(function(zip){
    return zip.file('word/document.xml').async('text').then(function(docXml){
      var parser=new DOMParser();
      var doc=parser.parseFromString(docXml,'application/xml');

      var images={};
      var relsFile=zip.file('word/_rels/document.xml.rels');
      var relsPromise=relsFile?relsFile.async('text').then(function(rXml){
        var rDoc=parser.parseFromString(rXml,'application/xml');
        var rels=rDoc.getElementsByTagName('Relationship');
        var imgPromises=[];
        for(var i=0;i<rels.length;i++){
          (function(rel){
            var type=rel.getAttribute('Type')||'';
            if(type.indexOf('image')!==-1){
              var rId=rel.getAttribute('Id');
              var target=rel.getAttribute('Target')||'';
              if(target.indexOf('word/')!==0)target='word/'+target;
              var imgFile=zip.file(target);
              if(imgFile){
                imgPromises.push(imgFile.async('blob').then(function(blob){
                  images[rId]=URL.createObjectURL(blob);
                }));
              }
            }
          })(rels[i]);
        }
        return Promise.all(imgPromises);
      }):Promise.resolve();

      return relsPromise.then(function(){
        var body=gw(doc,'body')[0];
        var redCount=0,yelCount=0;
        var blocks=[];

        function parseRuns(parent,contentArr,paraYellow){
          var runs=gw(parent,'r');
          for(var ri=0;ri<runs.length;ri++){
            var run=runs[ri];
            var rPr=gw(run,'rPr')[0];
            var bold=false,italic=false,underline=false,colorVal=null,hlVal=null,shdFill=null;
            if(rPr){
              if(gw(rPr,'b').length)bold=true;
              if(gw(rPr,'i').length)italic=true;
              var uEl=gw(rPr,'u')[0];
              if(uEl){var uv=wval(uEl,'val');if(uv!=='none')underline=true}
              var cEl=gw(rPr,'color')[0];
              if(cEl)colorVal=wval(cEl,'val');
              var hEl=gw(rPr,'highlight')[0];
              if(hEl)hlVal=wval(hEl,'val');
              var sEl=gw(rPr,'shd')[0];
              if(sEl){var sv=wval(sEl,'val');if(sv==='clear')shdFill=wval(sEl,'fill')}
            }

            var allEls=run.getElementsByTagName('*');
            var foundImg=false;
            for(var ei=0;ei<allEls.length;ei++){
              if(allEls[ei].localName==='blip'){
                var embed=rembed(allEls[ei]);
                if(embed&&images[embed]){contentArr.push({type:'img',src:images[embed]});foundImg=true;break}
              }
            }
            if(foundImg)continue;

            if(gw(run,'tab').length){contentArr.push({type:'tab'});continue}
            var brs=gw(run,'br');
            if(brs.length){
              var brType=wval(brs[0],'type');
              contentArr.push({type:brType==='page'?'pagebreak':'br'});
              continue;
            }

            var ts=gw(run,'t');
            if(!ts.length)continue;
            var text='';
            for(var ti=0;ti<ts.length;ti++)text+=ts[ti].textContent;
            if(!text)continue;

            var red=isRed(colorVal);
            var yel=!red&&isYellow(hlVal,shdFill);

            if(red){
              contentArr.push({type:'red',text:text});redCount++;
            }else if(yel){
              contentArr.push({type:'yel',text:text});yelCount++;
            }else if(paraYellow&&text.trim()){
              // ★ 修复：段落级黄色底纹，非空文本视为黄色
              contentArr.push({type:'yel',text:text});yelCount++;
            }else{
              contentArr.push({type:'txt',text:text,bold:bold,italic:italic,underline:underline,color:colorVal});
            }
          }
        }

        function getHeading(para){
          var pPr=gw(para,'pPr')[0];if(!pPr)return 0;
          var pStyle=gw(pPr,'pStyle')[0];if(!pStyle)return 0;
          var val=wval(pStyle,'val')||'';
          var m=val.match(/heading\s*(\d+)/i)||val.match(/^(\d+)$/);
          return m?parseInt(m[1]):0;
        }

        var children=body.children;
        for(var ci=0;ci<children.length;ci++){
          var child=children[ci];
          var ln=child.localName;
          if(ln==='p'){
            var heading=getHeading(child);
            // ★ 检测段落级黄色底纹
            var paraYellow=isParagraphShadingYellow(child);
            var content=[];parseRuns(child,content,paraYellow);
            blocks.push({type:'p',content:content,heading:heading});
          }else if(ln==='tbl'){
            var rows=[];
            var trs=gw(child,'tr');
            for(var tri=0;tri<trs.length;tri++){
              var cells=[];
              var tcs=gw(trs[tri],'tc');
              for(var tci=0;tci<tcs.length;tci++){
                var cellContent=[];
                var ps=gw(tcs[tci],'p');
                for(var pi=0;pi<ps.length;pi++){
                  var paraYellow=isParagraphShadingYellow(ps[pi]);
                  var content=[];parseRuns(ps[pi],content,paraYellow);
                  cellContent.push({type:'p',content:content,heading:0});
                }
                cells.push(cellContent);
              }
              rows.push(cells);
            }
            blocks.push({type:'tbl',rows:rows});
          }
        }

        mergeAcrossBlocks(blocks);

        redCount=0;yelCount=0;
        for(var bi=0;bi<blocks.length;bi++){
          var bparas=getParagraphs(blocks[bi]);
          for(var bpi=0;bpi<bparas.length;bpi++){
            for(var bii=0;bii<bparas[bpi].length;bii++){
              if(bparas[bpi][bii].type==='red')redCount++;
              else if(bparas[bpi][bii].type==='yel')yelCount++;
            }
          }
        }

        return {blocks:blocks,redCount:redCount,yelCount:yelCount};
      });
    });
  });
}

function renderFileList(){
  fileGrid.innerHTML='';
  if(docs.size===0){secHead.style.display='none';emptyState.style.display='';return}
  secHead.style.display='';emptyState.style.display='none';
  docCount.textContent=docs.size+' 个文档';
  docs.forEach(function(d,id){
    var card=document.createElement('div');card.className='file-card';
    card.innerHTML=
      '<button class="fc-del" data-id="'+id+'" title="删除"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'+
      '<div class="fc-inner">'+
        '<div class="fc-top">'+
          '<div class="fc-icon"><span>DOCX</span></div>'+
          '<div class="fc-info"><div class="fc-name">'+esc(d.name)+'</div><div class="fc-meta">'+fmtSize(d.size)+' · '+fmtDate(new Date(d.date))+'</div></div>'+
        '</div>'+
        '<div class="fc-badges">'+
          '<span class="badge red">'+d.redCount+' 红色标记</span>'+
          '<span class="badge yel">'+d.yelCount+' 黄色高亮</span>'+
        '</div>'+
      '</div>';
    card.addEventListener('click',function(e){if(!e.target.closest('.fc-del'))openReader(id)});
    card.querySelector('.fc-del').addEventListener('click',function(e){e.stopPropagation();docs.delete(id);renderFileList();toast('已删除','info')});
    fileGrid.appendChild(card);
  });
}

function openReader(id){
  var d=docs.get(id);if(!d)return;
  rName.textContent=d.name;
  rStats.innerHTML=
    '<span class="r-stat"><span class="dot rd"></span>'+d.redCount+' 红</span>'+
    '<span class="r-stat"><span class="dot yl"></span>'+d.yelCount+' 黄</span>';
  renderDoc(d);
  reader.classList.add('open');
  document.body.style.overflow='hidden';
  readerBody.scrollTop=0;
}

function renderDoc(d){
  var html='';
  for(var i=0;i<d.blocks.length;i++){
    var block=d.blocks[i];
    if(block.type==='p'){
      var tag=block.heading?'h'+Math.min(block.heading,6):'p';
      html+='<'+tag+'>'+renderContent(block.content)+'</'+tag+'>';
    }else if(block.type==='tbl'){
      html+='<table>';
      for(var r=0;r<block.rows.length;r++){
        html+='<tr>';
        for(var c=0;c<block.rows[r].length;c++){
          var tag=r===0?'th':'td';
          var cellHtml='';
          for(var p=0;p<block.rows[r][c].length;p++){
            cellHtml+='<p>'+renderContent(block.rows[r][c][p].content)+'</p>';
          }
          html+='<'+tag+'>'+cellHtml+'</'+tag+'>';
        }
        html+='</tr>';
      }
      html+='</table>';
    }else if(block.type==='pagebreak'){
      html+='<hr style="border:none;border-top:2px dashed #ccc;margin:32px 0">';
    }
  }
  readerBody.innerHTML=html||'<p style="color:var(--paper-m);text-align:center;padding:40px">文档内容为空</p>';

  var yelEls=readerBody.querySelectorAll('.yel-copy');
  for(var i=0;i<yelEls.length;i++){
    (function(el){
      el.addEventListener('click',function(){
        copyText(el.getAttribute('data-text'));
        el.classList.add('copied');
        el.textContent='已复制';
        setTimeout(function(){el.classList.remove('copied');el.textContent=el.getAttribute('data-text')},1200);
      });
    })(yelEls[i]);
  }
}

function renderContent(content){
  var html='';
  for(var i=0;i<content.length;i++){
    var c=content[i];
    if(c.type==='txt'){
      var style='';
      if(c.bold)style+='font-weight:700;';
      if(c.italic)style+='font-style:italic;';
      if(c.underline)style+='text-decoration:underline;';
      if(c.color)style+='color:#'+c.color.replace(/^#/,'')+';';
      html+=style?'<span style="'+style+'">'+esc(c.text)+'</span>':esc(c.text);
    }else if(c.type==='red'){
      html+='<span class="red-text">'+esc(c.text)+'</span>';
    }else if(c.type==='yel'){
      html+='<span class="yel-copy" data-text="'+esc(c.text)+'" title="点击复制">'+esc(c.text)+'</span>';
    }else if(c.type==='img'){
      html+='<img src="'+c.src+'" alt="图片">';
    }else if(c.type==='br'){
      html+='<br>';
    }else if(c.type==='tab'){
      html+='\t';
    }else if(c.type==='pagebreak'){
      html+='<hr style="border:none;border-top:2px dashed #ccc;margin:24px 0">';
    }
  }
  return html;
}

function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(function(){fallbackCopy(text)});
  }else{fallbackCopy(text)}
  toast('已复制到剪贴板','ok');
}
function fallbackCopy(text){
  var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
}

renderFileList();
}
</script>

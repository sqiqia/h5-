<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocX 智能解析器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  :root {
    --bg:#ffffff;--bg2:#f7f7f8;--card:#ffffff;--card-h:#f9f9fa;
    --brd:#e4e4e8;--brd2:#d0d0d6;
    --fg:#1a1a1f;--fg2:#5a5a64;--fg3:#9a9aa2;
    --accent:#d4872e;--accent-d:#b87325;
    --red:#d43d3d;--red-d:#b82e2e;--red-glow:rgba(212,61,61,.1);
    --yel:#c8960a;--yel-bg:rgba(200,150,10,.08);--yel-brd:rgba(200,150,10,.3);
    --ok:#3a9d3e;--err:#d43d3d;--info:#2e8bc0;
    --paper:#ffffff;--paper-t:#2c2c2c;--paper-m:#888;--paper-brd:#e8e8ec;
    --r:12px;--rs:8px;--rl:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}

  .bg-a{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .bg-a::before{content:'';position:absolute;top:-12%;right:-6%;width:500px;height:500px;background:radial-gradient(circle,rgba(212,61,61,.05),transparent 70%);animation:blob 22s ease-in-out infinite}
  .bg-a::after{content:'';position:absolute;bottom:-8%;left:-6%;width:400px;height:400px;background:radial-gradient(circle,rgba(200,150,10,.04),transparent 70%);animation:blob 28s ease-in-out infinite reverse}
  @keyframes blob{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-25px) scale(1.08)}66%{transform:translate(-20px,15px) scale(.95)}}
  .bg-g{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,0,0,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.018) 1px,transparent 1px);background-size:56px 56px}

  .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 24px 80px}

  header{text-align:center;margin-bottom:40px;animation:fu .6s ease-out}
  @keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .logo{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:var(--r);background:linear-gradient(135deg,var(--red),var(--accent));margin-bottom:18px;box-shadow:0 4px 16px var(--red-glow)}
  .logo svg{width:26px;height:26px;fill:#fff}
  header h1{font-family:'Noto Serif SC',serif;font-size:38px;font-weight:900;letter-spacing:-1px;color:var(--fg)}
  header h1 em{font-style:normal;color:var(--red)}
  header p{margin-top:8px;color:var(--fg2);font-size:15px;font-weight:300}
  header p b{color:var(--yel);font-weight:600}

  .upload-zone{border:2px dashed var(--brd);border-radius:var(--rl);padding:100px 60px;text-align:center;cursor:pointer;transition:.25s;background:var(--bg2);position:relative;overflow:hidden;margin-bottom:36px;animation:fu .6s ease-out .08s both;min-height:380px;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .upload-zone::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--red-glow),transparent 60%);opacity:0;transition:.25s}
  .upload-zone:hover,.upload-zone.over{border-color:var(--accent);background:var(--card)}
  .upload-zone:hover::before,.upload-zone.over::before{opacity:1}
  .upload-zone.over{transform:scale(1.005)}
  .u-icon{position:relative;z-index:1;width:80px;height:80px;margin:0 auto 24px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;border:1px solid var(--brd);transition:.25s;box-shadow:0 2px 12px rgba(0,0,0,.05)}
  .upload-zone:hover .u-icon{border-color:var(--accent);box-shadow:0 0 20px var(--red-glow)}
  .u-icon svg{width:36px;height:36px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .upload-zone h3{position:relative;z-index:1;font-size:20px;font-weight:600;margin-bottom:10px;color:var(--fg)}
  .upload-zone h3 u{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
  .upload-zone p{position:relative;z-index:1;color:var(--fg3);font-size:14px;line-height:1.6}
  #fileInput{display:none}

  .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;animation:fu .6s ease-out .14s both}
  .sec-head h2{font-size:18px;font-weight:600}
  .sec-head .count{color:var(--fg3);font-size:13px}

  .file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;animation:fu .6s ease-out .18s both}
  .file-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:20px;cursor:pointer;transition:.25s;position:relative;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .file-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--red-glow),transparent 50%);opacity:0;transition:.25s}
  .file-card:hover{border-color:var(--brd2);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
  .file-card:hover::after{opacity:1}
  .fc-inner{position:relative;z-index:1}
  .fc-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
  .fc-icon{width:42px;height:42px;border-radius:var(--rs);background:linear-gradient(135deg,#2b5797,#3e7cc1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .fc-icon span{color:#fff;font-weight:700;font-size:10px;letter-spacing:.5px}
  .fc-info{flex:1;min-width:0}
  .fc-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)}
  .fc-meta{color:var(--fg3);font-size:12px;margin-top:2px}
  .fc-badges{display:flex;gap:8px;flex-wrap:wrap}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
  .badge.red{background:rgba(212,61,61,.08);color:var(--red);border:1px solid rgba(212,61,61,.18)}
  .badge.yel{background:var(--yel-bg);color:var(--yel);border:1px solid var(--yel-brd)}
  .badge.pair{background:rgba(58,157,62,.08);color:var(--ok);border:1px solid rgba(58,157,62,.18)}
  .fc-del{position:absolute;top:12px;right:12px;z-index:2;width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--fg3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;opacity:0}
  .file-card:hover .fc-del{opacity:1}
  .fc-del:hover{background:rgba(212,61,61,.08);color:var(--red)}
  .fc-del svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

  .empty-state{text-align:center;padding:60px 20px;color:var(--fg3);animation:fu .6s ease-out .18s both}
  .empty-state svg{width:56px;height:56px;stroke:var(--brd2);fill:none;margin-bottom:16px;stroke-width:1.2}
  .empty-state p{font-size:14px}

  .reader{display:none;position:fixed;inset:0;z-index:100;background:var(--bg2);flex-direction:column;animation:rfi .3s ease-out}
  .reader.open{display:flex}
  @keyframes rfi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .reader-bar{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--card);border-bottom:1px solid var(--brd);flex-shrink:0;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .reader-bar .back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--brd);background:var(--card);color:var(--fg2);font-size:13px;font-weight:500;border-radius:var(--rs);cursor:pointer;transition:.2s;font-family:inherit}
  .reader-bar .back-btn:hover{border-color:var(--accent);color:var(--accent)}
  .reader-bar .back-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
  .reader-bar .r-name{font-weight:600;font-size:15px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)}
  .r-stats{display:flex;gap:12px;align-items:center}
  .r-stat{font-size:12px;color:var(--fg2);display:flex;align-items:center;gap:4px}
  .r-stat .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .r-stat .dot.rd{background:var(--red)}
  .r-stat .dot.yl{background:var(--yel)}
  .r-stat .dot.gr{background:var(--ok)}
  .reader-body{flex:1;overflow-y:auto;padding:32px;display:flex;justify-content:center}
  .reader-body::-webkit-scrollbar{width:8px}
  .reader-body::-webkit-scrollbar-track{background:transparent}
  .reader-body::-webkit-scrollbar-thumb{background:var(--brd);border-radius:4px}

  .paper{background:var(--card);border-radius:var(--rl);padding:48px 56px;max-width:820px;width:100%;min-height:500px;color:var(--paper-t);font-family:'Noto Serif SC',serif;font-size:15px;line-height:1.9;box-shadow:0 2px 16px rgba(0,0,0,.06),0 0 0 1px var(--brd);position:relative}
  .paper h1{font-size:26px;font-weight:900;color:#1a1a1a;margin:28px 0 14px;padding-bottom:10px;border-bottom:2px solid var(--paper-brd)}
  .paper h1:first-child{margin-top:0}
  .paper h2{font-size:21px;font-weight:700;color:#1a1a1a;margin:24px 0 10px}
  .paper h3{font-size:17px;font-weight:700;color:#1a1a1a;margin:20px 0 8px}
  .paper h4,.paper h5,.paper h6{font-weight:700;color:#1a1a1a;margin:18px 0 6px}
  .paper p{margin:8px 0;text-align:justify}
  .paper strong{font-weight:700}
  .paper em{font-style:italic}
  .paper u{text-decoration:underline}
  .paper ul,.paper ol{margin:10px 0;padding-left:26px}
  .paper li{margin:3px 0}
  .paper table{width:100%;border-collapse:collapse;margin:14px 0;font-size:14px}
  .paper th,.paper td{border:1px solid var(--paper-brd);padding:9px 12px;text-align:left}
  .paper th{background:#f4f4f6;font-weight:700}
  .paper img{max-width:100%;height:auto;border-radius:4px;margin:10px 0}
  .paper blockquote{border-left:4px solid var(--accent);padding:6px 18px;margin:14px 0;background:#faf8f4;color:var(--paper-m);font-style:italic}

  .red-btn{display:inline-flex;align-items:center;gap:5px;padding:3px 14px;border:none;border-radius:6px;background:var(--red);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;font-family:'Noto Serif SC',serif;vertical-align:middle;margin:0 2px;line-height:1.6;position:relative;box-shadow:0 1px 4px rgba(212,61,61,.2)}
  .red-btn:hover{background:var(--red-d);box-shadow:0 3px 12px rgba(212,61,61,.25);transform:scale(1.03)}
  .red-btn:active{transform:scale(.97)}
  .red-btn svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.2;flex-shrink:0}
  .red-btn.no-pair{background:#bbb;box-shadow:none;opacity:.55;cursor:default}
  .red-btn.no-pair:hover{transform:none;box-shadow:none}

  .yel-copy{display:inline;padding:2px 10px;border-radius:5px;background:rgba(200,150,10,.12);border:1px solid rgba(200,150,10,.3);color:#7a5c08;font-weight:500;cursor:pointer;transition:.2s;vertical-align:middle;margin:0 2px;line-height:1.7}
  .yel-copy:hover{background:rgba(200,150,10,.22);border-color:rgba(200,150,10,.5)}
  .yel-copy.copied{background:rgba(58,157,62,.1);border-color:rgba(58,157,62,.3);color:#2e7d32}

  .toast-c{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
  .toast{padding:12px 18px;border-radius:var(--rs);font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.1);animation:ti .3s ease-out;display:flex;align-items:center;gap:8px;max-width:340px;pointer-events:auto}
  .toast.ok{background:#eef7ee;border:1px solid #c5e1c5;color:#2e7d32}
  .toast.err{background:#fdeaea;border:1px solid #f0c0c0;color:#b82e2e}
  .toast.info{background:#eaf3fa;border:1px solid #b8d8ee;color:#1e6fa0}
  @keyframes ti{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
  @keyframes to{from{opacity:1}to{opacity:0;transform:translateX(30px)}}

  .loader-o{display:none;position:absolute;inset:0;background:rgba(255,255,255,.88);z-index:10;align-items:center;justify-content:center;flex-direction:column;gap:14px;border-radius:var(--rl)}
  .loader-o.on{display:flex}
  .spinner{width:36px;height:36px;border:3px solid var(--brd);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .loader-o span{color:var(--fg2);font-size:13px}

  @media(max-width:768px){
    .wrap{padding:20px 14px 60px}
    header h1{font-size:28px}
    .upload-zone{padding:60px 24px;min-height:280px}
    .file-grid{grid-template-columns:1fr}
    .paper{padding:28px 20px}
    .reader-bar{padding:10px 14px}
    .reader-body{padding:16px}
  }
  @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="bg-a"></div>
<div class="bg-g"></div>
<div class="toast-c" id="toastC"></div>

<div class="wrap" id="homeView">
  <header>
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><polyline points="14 2 14 8 20 8"/></svg></div>
    <h1>DocX <em>智能</em>解析器</h1>
    <p><b>红色</b> 文字自动变按钮 · <b>黄色高亮</b> 点击即复制 · 一键配对</p>
  </header>

  <div class="upload-zone" id="uploadZone">
    <div class="loader-o" id="loader"><div class="spinner"></div><span>正在解析文档...</span></div>
    <div class="u-icon">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </div>
    <h3>拖拽文件到此处，或 <u>点击选择</u></h3>
    <p>支持同时上传多个 .docx 文件</p>
    <input type="file" id="fileInput" accept=".docx" multiple>
  </div>

  <div class="sec-head" id="secHead" style="display:none">
    <h2>已上传文档</h2>
    <span class="count" id="docCount"></span>
  </div>
  <div class="file-grid" id="fileGrid"></div>
  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    <p>还没有上传任何文档</p>
  </div>
</div>

<div class="reader" id="reader">
  <div class="reader-bar">
    <button class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      返回
    </button>
    <span class="r-name" id="rName">-</span>
    <div class="r-stats" id="rStats"></div>
  </div>
  <div class="reader-body">
    <div class="paper" id="paper"></div>
  </div>
</div>

<script>
(function(){
'use strict';

const W='http://schemas.openxmlformats.org/wordprocessingml/2006/main';
const R='http://schemas.openxmlformats.org/officeDocument/2006/relationships';

const uploadZone=document.getElementById('uploadZone');
const fileInput=document.getElementById('fileInput');
const loader=document.getElementById('loader');
const fileGrid=document.getElementById('fileGrid');
const secHead=document.getElementById('secHead');
const docCount=document.getElementById('docCount');
const emptyState=document.getElementById('emptyState');
const reader=document.getElementById('reader');
const backBtn=document.getElementById('backBtn');
const rName=document.getElementById('rName');
const rStats=document.getElementById('rStats');
const paper=document.getElementById('paper');
const toastC=document.getElementById('toastC');

const docs=new Map();
let docIdCounter=0;

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'}
function fmtDate(d){if(!d||isNaN(d))return'未知';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}

function toast(msg,type='info'){
  const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;
  toastC.appendChild(t);
  setTimeout(()=>{t.style.animation='to .3s ease-in forwards';setTimeout(()=>t.remove(),300)},2500);
}

function gw(parent,tag){return parent.getElementsByTagNameNS(W,tag)}
function wval(el,attr){if(!el)return null;let v=el.getAttributeNS(W,attr);if(!v)v=el.getAttribute('w:'+attr);if(!v)v=el.getAttribute(attr);return v}
function rembed(el){if(!el)return null;let v=el.getAttributeNS(R,'embed');if(!v)v=el.getAttribute('r:embed');return v}

function isRed(hex){
  if(!hex)return false;
  hex=hex.replace(/^#/,'');
  if(hex.length===4)hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  if(hex.length!==6)return false;
  const r=parseInt(hex.substring(0,2),16),g=parseInt(hex.substring(2,4),16),b=parseInt(hex.substring(4,6),16);
  return r>150&&r>g*1.6&&r>b*1.6;
}
function isYellow(hlVal,shdFill){
  if(hlVal&&hlVal.toLowerCase()==='yellow')return true;
  if(shdFill){
    let h=shdFill.replace(/^#/,'');
    if(h.length===4)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    if(h.length===6){const r=parseInt(h.substring(0,2),16),g=parseInt(h.substring(2,4),16),b=parseInt(h.substring(4,6),16);return r>170&&g>150&&b<130}
  }
  return false;
}

uploadZone.addEventListener('click',e=>{if(!e.target.closest('.loader-o'))fileInput.click()});
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('over')});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('over'));
uploadZone.addEventListener('drop',e=>{e.preventDefault();uploadZone.classList.remove('over');for(const f of e.dataTransfer.files)if(f.name.toLowerCase().endsWith('.docx'))handleFile(f)});
fileInput.addEventListener('change',()=>{for(const f of fileInput.files)handleFile(f);fileInput.value=''});

backBtn.addEventListener('click',closeReader);
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&reader.classList.contains('open'))closeReader()});

function closeReader(){reader.classList.remove('open');document.body.style.overflow=''}

async function handleFile(file){
  if(!file.name.toLowerCase().endsWith('.docx')){toast('跳过非 .docx 文件: '+file.name,'err');return}
  if(file.size>50*1048576){toast('文件过大: '+file.name,'err');return}
  loader.classList.add('on');
  try{
    const buf=await file.arrayBuffer();
    const data=await parseDocx(buf);
    const id=++docIdCounter;
    docs.set(id,{name:file.name,size:file.size,date:file.lastModified,...data});
    renderFileList();
    toast('解析成功: '+file.name,'ok');
  }catch(err){
    console.error(err);toast('解析失败: '+file.name+' — '+(err.message||'未知错误'),'err');
  }finally{loader.classList.remove('on')}
}

async function parseDocx(buf){
  const zip=await JSZip.loadAsync(buf);
  const docXml=await zip.file('word/document.xml').async('text');
  const parser=new DOMParser();
  const doc=parser.parseFromString(docXml,'application/xml');

  const images={};
  const relsFile=zip.file('word/_rels/document.xml.rels');
  if(relsFile){
    const rXml=await relsFile.async('text');
    const rDoc=parser.parseFromString(rXml,'application/xml');
    const rels=rDoc.getElementsByTagName('Relationship');
    for(const rel of rels){
      const type=rel.getAttribute('Type')||'';
      if(type.includes('image')){
        const rId=rel.getAttribute('Id');
        let target=rel.getAttribute('Target')||'';
        if(!target.startsWith('word/'))target='word/'+target;
        const imgFile=zip.file(target);
        if(imgFile){const blob=await imgFile.async('blob');images[rId]=URL.createObjectURL(blob)}
      }
    }
  }

  const body=gw(doc,'body')[0];
  const reds=[];const yels=[];let ri=0,yi=0;const blocks=[];

  function parseRuns(parent,contentArr){
    const runs=gw(parent,'r');
    for(const run of runs){
      const rPr=gw(run,'rPr')[0];
      let bold=false,italic=false,underline=false,colorVal=null,hlVal=null,shdFill=null;
      if(rPr){
        if(gw(rPr,'b').length)bold=true;
        if(gw(rPr,'i').length)italic=true;
        const uEl=gw(rPr,'u')[0];
        if(uEl){const uv=wval(uEl,'val');if(uv!=='none')underline=true}
        const cEl=gw(rPr,'color')[0];
        if(cEl)colorVal=wval(cEl,'val');
        const hEl=gw(rPr,'highlight')[0];
        if(hEl)hlVal=wval(hEl,'val');
        const sEl=gw(rPr,'shd')[0];
        if(sEl){const sv=wval(sEl,'val');if(sv==='clear')shdFill=wval(sEl,'fill')}
      }

      const allEls=run.getElementsByTagName('*');
      let foundImg=false;
      for(const el of allEls){
        if(el.localName==='blip'){
          const embed=rembed(el);
          if(embed&&images[embed]){contentArr.push({type:'img',src:images[embed]});foundImg=true;break}
        }
      }
      if(foundImg)continue;

      const tabs=gw(run,'tab');
      if(tabs.length){contentArr.push({type:'tab'});continue}
      const brs=gw(run,'br');
      if(brs.length){
        const brType=wval(brs[0],'type');
        contentArr.push({type:brType==='page'?'pagebreak':'br'});
        continue;
      }

      const ts=gw(run,'t');
      if(!ts.length)continue;
      let text='';
      for(const t of ts)text+=t.textContent;
      if(!text)continue;

      const red=isRed(colorVal);
      const yel=!red&&isYellow(hlVal,shdFill);

      if(red){
        const idx=ri++;contentArr.push({type:'red',text,index:idx});reds.push({text,index:idx});
      }else if(yel){
        const idx=yi++;contentArr.push({type:'yel',text,index:idx});yels.push({text,index:idx});
      }else{
        contentArr.push({type:'txt',text,bold,italic,underline,color:colorVal});
      }
    }
  }

  function getHeading(para){
    const pPr=gw(para,'pPr')[0];if(!pPr)return 0;
    const pStyle=gw(pPr,'pStyle')[0];if(!pStyle)return 0;
    const val=wval(pStyle,'val')||'';
    const m=val.match(/heading\s*(\d+)/i)||val.match(/^(\d+)$/);
    return m?parseInt(m[1]):0;
  }

  const children=body.children;
  for(const child of children){
    const ln=child.localName;
    if(ln==='p'){
      const heading=getHeading(child);
      const content=[];parseRuns(child,content);
      blocks.push({type:'p',content,heading});
    }else if(ln==='tbl'){
      const rows=[];
      const trs=gw(child,'tr');
      for(const tr of trs){
        const cells=[];
        const tcs=gw(tr,'tc');
        for(const tc of tcs){
          const cellContent=[];
          const ps=gw(tc,'p');
          for(const p of ps){const content=[];parseRuns(p,content);cellContent.push({type:'p',content,heading:0})}
          cells.push(cellContent);
        }
        rows.push(cells);
      }
      blocks.push({type:'tbl',rows});
    }
  }

  const pairCount=Math.min(reds.length,yels.length);
  const pairs=[];
  for(let i=0;i<pairCount;i++)pairs.push({red:reds[i],yellow:yels[i]});

  return {blocks,reds,yels,pairs,redCount:reds.length,yelCount:yels.length,pairCount};
}

function renderFileList(){
  fileGrid.innerHTML='';
  if(docs.size===0){secHead.style.display='none';emptyState.style.display='';return}
  secHead.style.display='';emptyState.style.display='none';
  docCount.textContent=docs.size+' 个文档';
  for(const[id,d]of docs){
    const card=document.createElement('div');card.className='file-card';
    card.innerHTML=`
      <button class="fc-del" data-id="${id}" title="删除"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <div class="fc-inner">
        <div class="fc-top">
          <div class="fc-icon"><span>DOCX</span></div>
          <div class="fc-info"><div class="fc-name">${esc(d.name)}</div><div class="fc-meta">${fmtSize(d.size)} · ${fmtDate(new Date(d.date))}</div></div>
        </div>
        <div class="fc-badges">
          <span class="badge red">${d.redCount} 红色标记</span>
          <span class="badge yel">${d.yelCount} 黄色高亮</span>
          <span class="badge pair">${d.pairCount} 组配对</span>
        </div>
      </div>`;
    card.addEventListener('click',e=>{if(!e.target.closest('.fc-del'))openReader(id)});
    card.querySelector('.fc-del').addEventListener('click',e=>{e.stopPropagation();docs.delete(id);renderFileList();toast('已删除','info')});
    fileGrid.appendChild(card);
  }
}

function openReader(id){
  const d=docs.get(id);if(!d)return;
  rName.textContent=d.name;
  rStats.innerHTML=`
    <span class="r-stat"><span class="dot rd"></span>${d.redCount} 红</span>
    <span class="r-stat"><span class="dot yl"></span>${d.yelCount} 黄</span>
    <span class="r-stat"><span class="dot gr"></span>${d.pairCount} 配对</span>`;
  renderPaper(d);
  reader.classList.add('open');
  document.body.style.overflow='hidden';
  reader.querySelector('.reader-body').scrollTop=0;
}

function renderPaper(d){
  let html='';
  for(const block of d.blocks){
    if(block.type==='p'){
      const tag=block.heading?`h${Math.min(block.heading,6)}`:'p';
      html+=`<${tag}>${renderContent(block.content,d)}</${tag}>`;
    }else if(block.type==='tbl'){
      html+='<table>';
      for(let r=0;r<block.rows.length;r++){
        const isHeader=r===0;
        html+='<tr>';
        for(const cell of block.rows[r]){
          const tag=isHeader?'th':'td';
          let cellHtml='';
          for(const p of cell)cellHtml+='<p>'+renderContent(p.content,d)+'</p>';
          html+=`<${tag}>${cellHtml}</${tag}>`;
        }
        html+='</tr>';
      }
      html+='</table>';
    }else if(block.type==='pagebreak'){
      html+='<hr style="border:none;border-top:2px dashed #ccc;margin:32px 0">';
    }
  }
  paper.innerHTML=html||'<p style="color:var(--paper-m);text-align:center;padding:40px">文档内容为空</p>';

  paper.querySelectorAll('.red-btn').forEach(btn=>{
    const idx=parseInt(btn.dataset.idx);
    if(idx<d.pairCount){
      btn.addEventListener('click',()=>{
        copyText(d.yels[idx].text);
        btn.classList.add('copied');
        setTimeout(()=>btn.classList.remove('copied'),1200);
      });
    }
  });
  paper.querySelectorAll('.yel-copy').forEach(el=>{
    el.addEventListener('click',()=>{
      copyText(el.dataset.text);
      el.classList.add('copied');
      el.textContent='已复制';
      setTimeout(()=>{el.classList.remove('copied');el.textContent=el.dataset.text},1200);
    });
  });
}

function renderContent(content,d){
  let html='';
  for(const c of content){
    if(c.type==='txt'){
      let style='';
      if(c.bold)style+='font-weight:700;';
      if(c.italic)style+='font-style:italic;';
      if(c.underline)style+='text-decoration:underline;';
      if(c.color)style+='color:#'+c.color.replace(/^#/,'')+';';
      html+=style?`<span style="${style}">${esc(c.text)}</span>`:esc(c.text);
    }else if(c.type==='red'){
      const paired=c.index<d.pairCount;
      const cls=paired?'red-btn':'red-btn no-pair';
      html+=`<button class="${cls}" data-idx="${c.index}" title="${paired?'复制对应内容':'无配对'}"><svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>${esc(c.text)}</button>`;
    }else if(c.type==='yel'){
      html+=`<span class="yel-copy" data-text="${esc(c.text)}" title="点击复制">${esc(c.text)}</span>`;
    }else if(c.type==='img'){
      html+=`<img src="${c.src}" alt="图片">`;
    }else if(c.type==='br'){
      html+='<br>';
    }else if(c.type==='tab'){
      html+='\t';
    }else if(c.type==='pagebreak'){
      html+='<hr style="border:none;border-top:2px dashed #ccc;margin:24px 0">';
    }
  }
  return html;
}

async function copyText(text){
  try{await navigator.clipboard.writeText(text)}
  catch(e){
    const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
  }
  toast('已复制到剪贴板','ok');
}

renderFileList();
})();
</script>
</body>
</html>
